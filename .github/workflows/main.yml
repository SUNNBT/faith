name: Build FaithX

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect repository
        run: |
          Write-Host "Repository root: $PWD"
          Get-ChildItem -Path . -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
          if (Test-Path "FaithX\\FaithX.vprj") { Write-Host "Found FaithX.vprj" }
          if (Test-Path "FaithX.vsln") { Write-Host "Found FaithX.vsln" }
        shell: powershell

      - name: Build with vproject.exe
        run: |
          $vproject = Get-Command vproject.exe -ErrorAction SilentlyContinue
          if ($null -eq $vproject) {
            $pathsToCheck = @(
              "$env:ProgramFiles\wutao\bin\vproject.exe",
              "$env:ProgramFiles(x86)\wutao\bin\vproject.exe",
              "$env:ProgramFiles\火山软件\bin\vproject.exe"
            )
            foreach ($checkPath in $pathsToCheck) {
              if (Test-Path $checkPath) {
                $vproject = Get-Item $checkPath
                break
              }
            }
          }

          if ($null -eq $vproject) {
            Write-Host "::error::vproject.exe not found on PATH or typical install locations. The runner cannot compile this project without the Wutao/火山 build tool."
            exit 1
          }

          Write-Host "Found vproject.exe at $($vproject.Path)"
          & $vproject.Path build "FaithX\\FaithX.vprj"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::vproject build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
        shell: powershell

      - name: Upload build output artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FaithX-build-output
          path: |
            FaithX\\Release
            FaithX\\Debug
            FaithX\\bin
            FaithX\\build
            FaithX\\dist
            FaithX\\output

