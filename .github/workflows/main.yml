name: Build FaithX

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect repository
        run: |
          Write-Host "Repository root: $PWD"
          Get-ChildItem -Path . -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
          if (Test-Path "FaithX\\FaithX.vprj") { Write-Host "Found FaithX.vprj" }
          if (Test-Path "FaithX.vsln") { Write-Host "Found FaithX.vsln" }
        shell: powershell

      - name: Build with vproject.exe if available
        run: |
          $buildSucceeded = $false
          $vproject = Get-Command vproject.exe -ErrorAction SilentlyContinue
          if ($null -ne $vproject) {
            Write-Host "Found vproject.exe at $($vproject.Path)"
            & $vproject.Path build "FaithX\\FaithX.vprj"
            if ($LASTEXITCODE -eq 0) { $buildSucceeded = $true }
          } else {
            Write-Host "vproject.exe not found on PATH. Skipping compile step."
          }
          if (-Not $buildSucceeded) {
            Write-Host "Build did not complete successfully or build tool was not found."
            exit 1
          }
        shell: powershell

      - name: Upload build output artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaithX-build-output
          path: |
            FaithX\\Release
            FaithX\\Debug
            FaithX\\bin
            FaithX\\build
            FaithX\\dist
            FaithX\\output
