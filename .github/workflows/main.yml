name: Build FaithX

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect repository
        run: |
          Write-Host "Repository root: $PWD"
          Get-ChildItem -Path . -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
          if (Test-Path "FaithX\\FaithX.vprj") { Write-Host "Found FaithX.vprj" }
          if (Test-Path "FaithX.vsln") { Write-Host "Found FaithX.vsln" }
        shell: powershell

      - name: Build with vproject.exe if available
        run: |
          $vproject = Get-Command vproject.exe -ErrorAction SilentlyContinue
          if ($null -ne $vproject) {
            Write-Host "Found vproject.exe at $($vproject.Path)"
            & $vproject.Path build "FaithX\\FaithX.vprj"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "vproject build failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "vproject.exe not found on PATH. Skipping compile step."
            Write-Host "::warning::vproject.exe not found, build step skipped. Ensure the runner has the correct tool installed."
          }
        shell: powershell

      - name: Prepare artifact package
        run: |
          $outputPaths = @(
            "FaithX\\Release",
            "FaithX\\Debug",
            "FaithX\\bin",
            "FaithX\\build",
            "FaithX\\dist",
            "FaithX\\output"
          )
          $found = $false
          foreach ($path in $outputPaths) {
            if (Test-Path $path) {
              Write-Host "Found output directory: $path"
              $found = $true
            }
          }
          if (-not $found) {
            Write-Host "No build output directories found; packaging source files instead."
            New-Item -ItemType Directory -Path artifact -Force | Out-Null
            Copy-Item -Path FaithX -Destination artifact -Recurse -Force
            Copy-Item -Path FaithX.vsln, FaithX\\FaithX.vprj, README.md -Destination artifact -Force
          } else {
            New-Item -ItemType Directory -Path artifact -Force | Out-Null
            foreach ($path in $outputPaths) {
              if (Test-Path $path) {
                Copy-Item -Path $path -Destination artifact -Recurse -Force
              }
            }
          }
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaithX-artifact
          path: artifact

